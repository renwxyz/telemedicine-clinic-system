<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Konsultasi Baru - KlinikKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900">

    <div th:replace="~{fragments/customer-navbar :: customerNavbar('consultations')}"></div>

    <div class="pt-24 pb-12 px-6 sm:px-8 max-w-7xl mx-auto">

        <div class="mb-8">
            <h1 class="text-3xl font-bold text-stone-900 mb-2">Buat Konsultasi Baru</h1>
            <p class="text-stone-600">Pilih dokter yang tersedia dan ceritakan keluhan Anda untuk memulai konsultasi.
            </p>
        </div>

        <div th:if="${error}"
            class="mb-6 bg-red-50 border border-red-200 text-red-600 px-5 py-4 rounded-2xl flex items-start">
            <i class="fas fa-exclamation-circle mt-1 mr-3 text-lg"></i>
            <span class="font-medium" th:text="${error}"></span>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">

            <div class="lg:w-2/3">
                <h2 class="text-xl font-semibold mb-4 text-stone-800 flex items-center">
                    <span
                        class="bg-orange-100 text-orange-600 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                    Pilih Dokter
                </h2>

                <div th:if="${#lists.isEmpty(availableDoctors)}"
                    class="bg-white rounded-2xl border border-stone-200 p-12 text-center">
                    <svg class="w-16 h-16 mx-auto text-stone-300 mb-4" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-stone-600 font-medium">Mohon maaf, saat ini belum ada dokter yang tersedia.</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div th:each="doctor : ${availableDoctors}" th:id="'doctor-card-' + ${doctor.userId}"
                        class="doctor-card bg-white rounded-2xl border border-stone-200 p-5 cursor-pointer transition-all hover:shadow-md hover:border-orange-300"
                        th:data-id="${doctor.userId}" th:data-name="${doctor.name}"
                        onclick="selectDoctor(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                        <div class="flex items-start gap-4">
                            <div
                                class="w-14 h-14 bg-stone-100 rounded-full flex items-center justify-center text-stone-400 text-2xl flex-shrink-0">
                                <i class="fas fa-user-md"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-semibold text-lg text-stone-900" th:text="${doctor.name}">Nama Dokter
                                </h3>
                                <p class="text-sm text-stone-500 mb-4"><i class="fas fa-stethoscope mr-1"></i> Dokter
                                    Umum</p>

                                <button type="button" th:id="'btn-doctor-' + ${doctor.userId}"
                                    class="btn-select text-sm font-medium px-4 py-2 rounded-xl border border-stone-200 text-stone-600 w-full transition-colors">
                                    Pilih Dokter
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-1/3">
                <div class="sticky top-28 bg-white rounded-2xl border border-stone-200 p-6 shadow-sm">
                    <h2 class="text-xl font-semibold mb-5 text-stone-800 flex items-center">
                        <span
                            class="bg-orange-100 text-orange-600 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        Detail Keluhan
                    </h2>

                    <div class="mb-5 p-4 bg-stone-50 rounded-xl border border-stone-100">
                        <p class="text-sm text-stone-500 mb-1">Dokter Terpilih:</p>
                        <p id="doctorNameDisplay" class="font-semibold text-stone-400">Belum ada yang dipilih</p>
                    </div>

                    <form th:action="@{/customer/consultations/new}" th:object="${consultationForm}" method="post">
                        <input type="hidden" id="doctorId" th:field="*{doctorId}">

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-stone-700 mb-2">Keluhan Utama <span
                                    class="text-red-500">*</span></label>
                            <textarea th:field="*{complaint}" rows="4"
                                class="w-full rounded-xl border border-stone-200 bg-stone-50 p-4 text-stone-900 focus:bg-white focus:border-orange-500 focus:ring-2 focus:ring-orange-100 transition-all outline-none resize-none"
                                placeholder="Jelaskan sakit atau gejala yang Anda rasakan secara detail..."
                                required></textarea>
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-medium text-stone-700 mb-2">Informasi Tambahan <span
                                    class="text-stone-400 font-normal">(Opsional)</span></label>
                            <textarea th:field="*{additionalInfo}" rows="2"
                                class="w-full rounded-xl border border-stone-200 bg-stone-50 p-4 text-stone-900 focus:bg-white focus:border-orange-500 focus:ring-2 focus:ring-orange-100 transition-all outline-none resize-none"
                                placeholder="Alergi obat, riwayat penyakit sebelumnya..."></textarea>
                        </div>

                        <button type="submit" id="btnSubmit" disabled
                            class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-stone-200 disabled:text-stone-400 disabled:cursor-not-allowed text-white font-semibold py-3.5 px-4 rounded-xl transition-colors">
                            Kirim Permintaan Konsultasi
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        function selectDoctor(doctorId, doctorName) {
            // 1. Isi input hidden dengan ID dokter
            document.getElementById('doctorId').value = doctorId;

            // 2. Ubah teks nama dokter di form kanan
            const nameDisplay = document.getElementById('doctorNameDisplay');
            nameDisplay.innerText = doctorName;
            nameDisplay.classList.remove('text-stone-400');
            nameDisplay.classList.add('text-orange-600');

            // 3. Reset visual semua card dokter
            document.querySelectorAll('.doctor-card').forEach(card => {
                card.classList.remove('ring-2', 'ring-orange-500', 'bg-orange-50', 'border-transparent');
                card.classList.add('border-stone-200', 'bg-white');
            });

            // 4. Reset semua tombol 'Pilih Dokter'
            document.querySelectorAll('.btn-select').forEach(btn => {
                btn.innerHTML = 'Pilih Dokter';
                btn.classList.remove('bg-orange-500', 'text-white', 'border-orange-500');
                btn.classList.add('border-stone-200', 'text-stone-600');
            });

            // 5. Highlight card yang dipilih
            const selectedCard = document.getElementById('doctor-card-' + doctorId);
            selectedCard.classList.remove('border-stone-200', 'bg-white');
            selectedCard.classList.add('ring-2', 'ring-orange-500', 'bg-orange-50', 'border-transparent');

            // 6. Highlight tombol pada card yang dipilih
            const selectedBtn = document.getElementById('btn-doctor-' + doctorId);
            selectedBtn.innerHTML = '<i class=\"fas fa-check mr-1\"></i> Terpilih';
            selectedBtn.classList.remove('border-stone-200', 'text-stone-600');
            selectedBtn.classList.add('bg-orange-500', 'text-white', 'border-orange-500');

            // 7. Enable tombol submit form
            document.getElementById('btnSubmit').disabled = false;
        }

        // Auto-select jika ada balikan error dari form submit sebelumnya
        document.addEventListener('DOMContentLoaded', function () {
            const currentDoctorId = document.getElementById('doctorId').value;
            if (currentDoctorId) {
                const cardEl = document.getElementById('doctor-card-' + currentDoctorId);
                if (cardEl) {
                    cardEl.click(); // Trigger click untuk men-set UI
                }
            }
        });
    </script>
</body>

</html>
