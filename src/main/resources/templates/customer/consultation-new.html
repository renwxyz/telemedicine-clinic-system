<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Konsultasi Baru - KlinikKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900">

    <div th:replace="~{fragments/customer-navbar :: customerNavbar('consultations')}"></div>

  <main class="pt-24 pb-16 min-h-screen bg-[#FDF3F0]">
    <div class="max-w-7xl mx-auto px-6">
      
      <div class="mb-8">
          <h1 class="text-3xl font-bold text-stone-900">Buat Konsultasi Baru</h1>
          <p class="text-stone-500 mt-1">Pilih dokter spesialis dan ceritakan keluhan Anda untuk memulai.</p>
      </div>

      <div th:if="${error}"
          class="mb-6 bg-red-50 border border-red-200 text-red-600 px-5 py-4 rounded-2xl flex items-start">
          <i class="fas fa-exclamation-circle mt-1 mr-3 text-lg"></i>
          <span class="font-medium" th:text="${error}"></span>
      </div>

      <form th:action="@{/customer/consultations/new}" method="post" id="consultationForm">
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
          
          <div class="lg:col-span-7 flex flex-col gap-6">
            
            <div class="bg-white p-4 rounded-2xl border border-stone-200 shadow-sm flex flex-col sm:flex-row gap-4">
              <input type="text" id="searchDoctor" placeholder="Cari nama dokter..." class="w-full px-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#D53E0F] text-sm">
              <select id="filterSpecialization" class="w-full sm:w-48 px-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#D53E0F] text-sm">
                <option value="all">Semua Spesialis</option>
                <option value="Umum">Dokter Umum</option>
                <option value="Kulit">Kulit & Kelamin</option>
                <option value="Gizi">Spesialis Gizi</option>
              </select>
            </div>

            <h2 class="text-lg font-bold text-stone-900 flex items-center gap-2">
               <span class="bg-[#D53E0F] text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
               Pilih Dokter
            </h2>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[600px] overflow-y-auto pr-2 pb-4" id="doctorGrid">
              
              <label th:each="doctor : ${availableDoctors}" class="relative cursor-pointer group doctor-card" th:data-name="${#strings.toLowerCase(doctor.name)}" th:data-spec="${doctor.specialization}">
                <input type="radio" name="doctorId" th:value="${doctor.userId}" class="peer sr-only" onchange="updateSelectedDoctor(this)" th:data-doc-name="${doctor.name}" th:data-doc-spec="${doctor.specialization}" required>
                
                <div class="p-5 border-2 border-stone-200 rounded-2xl transition-all peer-checked:border-[#D53E0F] peer-checked:bg-orange-50 peer-checked:shadow-md hover:border-orange-300 bg-white h-full flex flex-col">
                  <div class="flex items-center gap-4 mb-4">
                    <img th:if="${doctor.profilePhotoPath != null and doctor.profilePhotoPath != ''}" th:src="${doctor.profilePhotoPath}" alt="Doctor" class="w-14 h-14 rounded-full object-cover border border-stone-200">
                    <div th:unless="${doctor.profilePhotoPath != null and doctor.profilePhotoPath != ''}" class="w-14 h-14 rounded-full bg-[#FAD5C8] flex items-center justify-center border border-[#D53E0F]/20">
                       <span class="text-xl font-bold text-[#D53E0F]" th:text="${#strings.substring(doctor.name, 0, 1)}">D</span>
                    </div>
                    
                    <div>
                      <h3 class="font-bold text-stone-900 leading-tight" th:text="${doctor.name}">Dr. Nama</h3>
                      <span class="inline-block px-2 py-1 mt-1.5 text-[10px] font-bold uppercase rounded-md"
                            th:classappend="${doctor.specialization == 'Umum' or doctor.specialization == 'Dokter Umum'} ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'"
                            th:text="${doctor.specialization}">Spesialis</span>
                    </div>
                  </div>
                  <div class="mt-auto pt-3 border-t border-stone-100 flex justify-between items-center">
                    <span class="text-xs text-stone-500 font-medium">Biaya Sesi</span>
                    <span class="text-sm font-bold text-[#D53E0F]">Hubungi Dokter</span>
                  </div>
                </div>
              </label>

            </div>
          </div>

          <div class="lg:col-span-5 sticky top-28">
            <div class="bg-white rounded-2xl border border-stone-200 shadow-lg shadow-stone-200/50 p-6 lg:p-8">
              <h2 class="text-xl font-bold text-stone-900 mb-6 flex items-center gap-2">
                 <span class="bg-[#D53E0F] text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                 Detail Keluhan
              </h2>

              <div class="bg-stone-50 rounded-xl p-4 mb-6 border border-stone-200 transition-all" id="selectedDoctorBox">
                <p class="text-xs text-stone-500 font-semibold mb-2">DOKTER TERPILIH:</p>
                <div id="selectedDoctorDisplay" class="flex items-center gap-3">
                  <p class="text-sm text-stone-400 italic">← Silakan pilih dokter di samping terlebih dahulu</p>
                </div>
              </div>

              <div class="space-y-5">
                <div>
                  <label class="block text-sm font-semibold text-stone-700 mb-2">Keluhan Utama <span class="text-red-500">*</span></label>
                  <textarea name="complaint" rows="4" placeholder="Jelaskan keluhan yang Anda rasakan secara detail..." class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#D53E0F] transition" required></textarea>
                </div>
                <div>
                  <label class="block text-sm font-semibold text-stone-700 mb-2">Informasi Tambahan <span class="text-stone-400 font-normal">(Opsional)</span></label>
                  <textarea name="additionalInfo" rows="2" placeholder="Alergi obat, riwayat penyakit sebelumnya..." class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#D53E0F] transition"></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="w-full py-4 mt-2 bg-stone-300 text-stone-500 font-bold rounded-xl transition-all cursor-not-allowed shadow-sm" disabled>
                  Pilih Dokter Dulu
                </button>
              </div>
            </div>
          </div>

        </div>
      </form>
    </div>
  </main>

  <script>
    // Fungsi untuk memperbarui panel kanan saat dokter dipilih
    function updateSelectedDoctor(radio) {
      const docName = radio.getAttribute('data-doc-name');
      const docSpec = radio.getAttribute('data-doc-spec');
      const displayDiv = document.getElementById('selectedDoctorDisplay');
      const submitBtn = document.getElementById('submitBtn');
      const box = document.getElementById('selectedDoctorBox');

      // Animasi Box
      box.classList.remove('bg-stone-50', 'border-stone-200');
      box.classList.add('bg-orange-50', 'border-orange-200');

      // Injeksi HTML Dokter
      displayDiv.innerHTML = `
        <div class="w-10 h-10 rounded-full bg-[#FAD5C8] flex items-center justify-center border border-[#D53E0F]/20 flex-shrink-0 shadow-sm">
           <span class="text-sm font-bold text-[#D53E0F]">${docName.charAt(0)}</span>
        </div>
        <div>
          <p class="text-sm font-bold text-stone-900">${docName}</p>
          <p class="text-[11px] font-bold text-[#D53E0F] uppercase tracking-wide mt-0.5">${docSpec}</p>
        </div>
      `;

      // Aktifkan Tombol Submit
      submitBtn.disabled = false;
      submitBtn.classList.remove('bg-stone-300', 'text-stone-500', 'cursor-not-allowed');
      submitBtn.classList.add('bg-[#D53E0F]', 'text-white', 'hover:bg-[#5E0006]', 'hover:shadow-lg', 'transform', 'hover:-translate-y-0.5');
      submitBtn.textContent = 'Kirim Permintaan Konsultasi';
    }

    // Fungsi Simple Search & Filter (Front-End)
    document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById('searchDoctor');
        const filterSelect = document.getElementById('filterSpecialization');
        const cards = document.querySelectorAll('.doctor-card');

        function filterDoctors() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterTerm = filterSelect.value.toLowerCase();

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const spec = card.getAttribute('data-spec').toLowerCase();
                
                const matchSearch = name.includes(searchTerm);
                const matchFilter = filterTerm === 'all' || spec.includes(filterTerm);

                if (matchSearch && matchFilter) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterDoctors);
        filterSelect.addEventListener('change', filterDoctors);
    });
  </script>
</body>

</html>
