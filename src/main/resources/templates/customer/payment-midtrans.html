<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesaikan Pembayaran - KlinikKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script type="text/javascript" src="https://app.sandbox.midtrans.com/snap/snap.js" th:data-client-key="${midtransClientKey}"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white rounded-3xl border border-stone-200 p-8 max-w-md w-full shadow-lg text-center">
        <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-shield-heart text-4xl text-orange-500"></i>
        </div>

        <h1 class="text-2xl font-bold text-stone-900 mb-2">Selesaikan Pembayaran</h1>
        <p class="text-stone-500 text-sm mb-6">Pesanan Anda telah berhasil dibuat. Silakan lakukan pembayaran untuk
            memproses obat Anda.</p>

        <div class="bg-stone-50 rounded-2xl p-5 border border-stone-100 text-left mb-8 space-y-3">
            <div class="flex justify-between text-sm">
                <span class="text-stone-500">Total Pembayaran:</span>
                <span class="font-bold text-orange-600 text-lg"
                    th:text="'Rp ' + ${#numbers.formatInteger(order.totalAmount, 0, 'POINT')}">Rp 0</span>
            </div>
        </div>

        <div class="space-y-3">
            <button id="pay-button"
                th:data-token="${order.snapToken}"
                onclick="payWithMidtrans(this.getAttribute('data-token'))"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-sm shadow-orange-200 flex items-center justify-center gap-2 transform active:scale-95">
                <i class="fas fa-credit-card"></i> Bayar Sekarang
            </button>

            <a th:href="@{/customer/orders}"
                class="block text-center text-sm font-medium text-stone-500 hover:text-stone-700 pt-2">
                Lihat Daftar Pesanan Saya
            </a>
        </div>
    </div>

    <script>
        function payWithMidtrans(token) {
            if (!token || token === 'null' || token === '') {
                alert('Token pembayaran tidak ditemukan. Silakan hubungi admin.');
                return;
            }

            // Memanggil fungsi bawaan SDK Midtrans Snap
            window.snap.pay(token, {
                onSuccess: function (result) {
                    /* Pembayaran berhasil dilakukan */
                    window.location.href = '/customer/orders';
                },
                onPending: function (result) {
                    /* User mendapatkan kode bayar tapi belum transfer (misal m-banking) */
                    window.location.href = '/customer/orders';
                },
                onError: function (result) {
                    /* Terjadi kegagalan sistem pembayaran */
                    alert('Pembayaran gagal! Silakan coba beberapa saat lagi.');
                    window.location.href = '/customer/orders';
                },
                onClose: function () {
                    /* User menutup pop-up sebelum menyelesaikan pembayaran */
                    console.log('User membatalkan pembayaran.');
                }
            });
        }

        // Jalankan pop-up otomatis saat halaman selesai dimuat agar user tidak perlu klik lagi
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('pay-button');
            if (btn) {
                const token = btn.getAttribute('data-token');
                if (token && token !== 'null' && token !== '') {
                    payWithMidtrans(token);
                }
            }
        });
    </script>
</body>

</html>
