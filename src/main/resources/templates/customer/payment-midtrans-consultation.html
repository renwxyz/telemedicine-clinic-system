<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesaikan Pembayaran Konsultasi - KlinikKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script type="text/javascript" src="https://app.sandbox.midtrans.com/snap/snap.js" th:data-client-key="${midtransClientKey}"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white rounded-3xl border border-stone-200 p-8 max-w-md w-full shadow-lg text-center">
        <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-user-md text-4xl text-orange-500"></i>
        </div>

        <h1 class="text-2xl font-bold text-stone-900 mb-2">Selesaikan Pembayaran</h1>
        <p class="text-stone-500 text-sm mb-6">Permintaan konsultasi Anda berhasil dibuat. Silakan selesaikan pembayaran untuk mulai sesi chat dengan dokter.</p>

        <div class="bg-stone-50 rounded-2xl p-5 border border-stone-100 text-left mb-8 space-y-3">
            <div class="flex justify-between text-sm">
                <span class="text-stone-500">Dokter:</span>
                <span class="font-bold text-stone-900" th:text="${consultation.getDoctorName()}">Nama Dokter</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-stone-500">Spesialisasi:</span>
                <span class="font-medium text-stone-700" th:text="${consultation.getDoctorSpecialization()}">Spesialisasi</span>
            </div>
            <hr class="border-stone-200">
            <div class="flex justify-between text-sm">
                <span class="text-stone-500">Total Pembayaran:</span>
                <span class="font-bold text-orange-600 text-lg">Rp 50.000</span>
            </div>
        </div>

        <div class="space-y-3">
            <button id="pay-button"
                th:data-token="${snapToken}"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-sm shadow-orange-200 flex items-center justify-center gap-2 transform active:scale-95">
                <i class="fas fa-credit-card"></i> Bayar Sekarang
            </button>

            <a th:href="@{/customer/consultations}"
                class="block text-center text-sm font-medium text-stone-500 hover:text-stone-700 pt-2">
                Batal / Kembali ke Daftar Konsultasi
            </a>
        </div>
    </div>

    <script>
        document.getElementById('pay-button').onclick = function(){
            const token = this.getAttribute('data-token');
            if (!token || token === 'null' || token === '') {
                alert('Token pembayaran tidak ditemukan. Silakan hubungi admin.');
                return;
            }

            window.snap.pay(token, {
                onSuccess: function (result) {
                    window.location.href = '/customer/consultations';
                },
                onPending: function (result) {
                    window.location.href = '/customer/consultations';
                },
                onError: function (result) {
                    alert('Pembayaran gagal! Silakan coba beberapa saat lagi.');
                    window.location.href = '/customer/consultations';
                },
                onClose: function () {
                    console.log('User membatalkan pembayaran.');
                }
            });
        };

        // Otomatis munculkan snap popup
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('pay-button');
            if (btn) {
                btn.click();
            }
        });
    </script>
</body>

</html>
