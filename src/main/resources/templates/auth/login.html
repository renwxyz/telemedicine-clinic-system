<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Masuk')}"></head>
<body class="bg-[#FDF3F0] min-h-screen flex items-center justify-center px-4">

  <!-- Login Card -->
  <div class="bg-white max-w-md w-full shadow-xl rounded-2xl p-8">

    <!-- Header -->
    <div class="flex flex-col items-center mb-6">
      <!-- Medical Icon -->
      <div class="bg-[#FAD5C8] w-12 h-12 rounded-full flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-[#D53E0F]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 11v4m-2-2h4"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-stone-900 text-center">Selamat Datang Kembali</h1>
      <p class="text-sm text-stone-500 text-center mt-1">Masuk untuk melanjutkan konsultasi dan pesanan Anda</p>
    </div>

    <!-- Alert Error -->
    <!-- th:if="${error}" akan menampilkan alert jika ada error dari server -->
    <div th:if="${error}"
         class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-center gap-2 mb-4">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span th:text="${error}">Email atau password salah.</span>
    </div>

    <!-- Alert Sukses (redirect dari register) -->
    <!-- th:if="${successMessage}" akan menampilkan alert sukses jika ada pesan dari halaman registrasi -->
    <div th:if="${successMessage}"
         class="bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 text-sm flex items-center gap-2 mb-4">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span th:text="${successMessage}">Registrasi berhasil! Silakan masuk.</span>
    </div>

    <!-- Form Login -->
    <!-- th:action dan th:object untuk binding ke controller Spring Boot -->
    <form th:action="@{/auth/login}" th:object="${loginForm}" method="post" class="space-y-4">
      
      <!-- CSRF Token -->
      <!-- Token CSRF untuk keamanan form submission -->
      <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Field Email -->
      <div>
        <label for="email" class="block font-medium text-sm text-stone-700 mb-1">Email</label>
        <!-- th:field="*{email}" untuk binding field email ke form object -->
        <input 
          type="email" 
          id="email"
          th:field="*{email}" 
          placeholder="contoh@email.com"
          th:classappend="${#fields.hasErrors('email')} ? 'border-red-400' : ''"
          class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition"
        />
        <!-- th:errors="*{email}" untuk menampilkan pesan error validasi email -->
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1">Email tidak valid.</p>
      </div>

      <!-- Field Password -->
      <div>
        <div class="flex justify-between items-center mb-1">
          <label for="password" class="block font-medium text-sm text-stone-700">Password</label>
          <!-- th:href="@{/auth/forgot-password}" untuk link lupa password -->
          <a th:href="@{/auth/forgot-password}" class="text-xs font-medium text-[#D53E0F] hover:text-[#5E0006] transition-colors">Lupa password?</a>
        </div>
        <div class="relative">
          <!-- th:field="*{password}" untuk binding field password ke form object -->
          <input 
            type="password" 
            id="password"
            th:field="*{password}" 
            placeholder="Masukkan password Anda"
            th:classappend="${#fields.hasErrors('password')} ? 'border-red-400' : ''"
            class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition pr-10"
          />
          <!-- Toggle Password Visibility Button -->
          <button 
            type="button" 
            id="togglePassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors"
            aria-label="Toggle password visibility"
          >
            <!-- Eye Icon (show password) -->
            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <!-- Eye Off Icon (hide password) - hidden by default -->
            <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
        <!-- th:errors="*{password}" untuk menampilkan pesan error validasi password -->
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-xs mt-1">Password tidak valid.</p>
      </div>

      <!-- Tombol Submit -->
      <button 
        type="submit"
        class="w-full bg-[#D53E0F] hover:bg-[#5E0006] text-white font-semibold py-3 rounded-xl transition-colors duration-200 text-sm mt-2 cursor-pointer"
      >
        Masuk
      </button>
    </form>

    <!-- Footer Card -->
    <div class="border-t border-stone-100 mt-6 pt-4 text-center text-sm text-stone-500">
      Belum punya akun?
      <!-- th:href="@{/auth/register}" untuk link ke halaman registrasi -->
      <a th:href="@{/auth/register}" class="font-semibold text-[#D53E0F] hover:text-[#5E0006] ml-1 transition-colors">Daftar sekarang</a>
    </div>

  </div>

</body>

<!-- Vanilla JS untuk toggle password visibility -->
<script>
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');
  const eyeOffIcon = document.getElementById('eyeOffIcon');

  togglePassword.addEventListener('click', function() {
    // Toggle tipe input antara password dan text
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    
    // Toggle ikon mata
    eyeIcon.classList.toggle('hidden');
    eyeOffIcon.classList.toggle('hidden');
  });
</script>
</html>
