<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Resep - TelemedicineHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#FDF3F0]" style="font-family: 'Plus Jakarta Sans', sans-serif;">
    <!-- Navbar -->
    <div th:replace="~{fragments/pharmacy-navbar :: pharmacistNavbar('validasi')}"></div>

    <!-- Main Content -->
    <main class="pt-24 pb-16">
        <div class="max-w-7xl mx-auto px-6">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Validasi & Raci Resep</h1>
                <p class="text-gray-600">Kelola resep dari dokter dan atur pembaruan status</p>
            </div>

            <!-- Filter Section -->
            <div class="bg-white rounded-2xl shadow-md border border-stone-200 p-6 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" placeholder="Cari nomor resep atau pasien..." class="px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#D53E0F]">
                    <select class="px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#D53E0F]">
                        <option>Semua Status</option>
                        <option>Menunggu Validasi</option>
                        <option>Validasi Selesai</option>
                        <option>Ditolak</option>
                    </select>
                    <select class="px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#D53E0F]">
                        <option>Semua Dokter</option>
                        <option>Dr. Ahmad Fauzi</option>
                        <option>Dr. Eka Putri</option>
                        <option>Dr. Rinto Harahap</option>
                    </select>
                    <button class="bg-[#D53E0F] text-white font-semibold py-2 rounded-lg hover:bg-[#5E0006] transition">
                        Cari
                    </button>
                </div>
            </div>

            <!-- Prescriptions List -->
            <!-- Prescriptions List -->
            <div class="space-y-4">
                <div th:each="order : ${orders}" th:with="prescription=${prescriptionMap.get(order.prescriptionId)}" class="bg-white rounded-2xl shadow-md border border-stone-200 p-6 hover:shadow-lg transition">
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-start mb-4">
                        <div>
                            <p class="text-xs text-gray-600 font-medium">NOMOR RESEP</p>
                            <p class="text-lg font-bold text-gray-900" th:text="${order.prescriptionId}"></p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-600 font-medium">DOKTER</p>
                            <p class="text-sm text-gray-900 font-semibold" th:text="${prescription != null ? prescription.consultation.doctor.name : 'Dokter KlinikKu'}"></p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-600 font-medium">PASIEN</p>
                            <p class="text-sm text-gray-900 font-semibold" th:text="${order.recipientName}"></p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-600 font-medium">TANGGAL</p>
                            <p class="text-sm text-gray-600" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy, HH:mm')}"></p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-600 font-medium">STATUS</p>
                            <p class="inline-block text-xs bg-orange-100 text-orange-700 px-3 py-1 rounded-full font-medium">Menunggu Validasi</p>
                        </div>
                    </div>

                    <div class="border-t border-stone-200 pt-4 mb-4">
                        <h4 class="font-semibold text-gray-900 mb-3">Daftar Obat:</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div th:each="item : ${order.items}" class="bg-gray-50 p-3 rounded-lg">
                                <p class="font-medium text-gray-900" th:text="${item.medicineName} + ' (' + ${item.quantity} + ' pcs)'"></p>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button class="flex-1 bg-[#D53E0F] text-white font-semibold py-3 rounded-lg hover:bg-[#5E0006] transition" 
                                th:onclick="openValidationModal([[${order.orderId}]], [[${order.prescriptionId}]], [[${order.recipientName}]])">
                            Validasi & Raci Obat
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Validation Modal -->
    <div id="validationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-stone-200 px-8 py-6 flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">Validasi & Raci Resep</h2>
                    <p class="text-sm text-gray-600 mt-1" id="modalRecipientInfo">Pasien: Loading...</p>
                </div>
                <button onclick="closeValidationModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="p-8 space-y-6">
                <!-- Validation Checklist -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-gray-900 mb-3">Daftar Pengecekan Validasi</h3>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-[#D53E0F] rounded focus:ring-[#D53E0F]">
                            <span class="ml-3 text-gray-700">Resep sah dan autentik</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-[#D53E0F] rounded focus:ring-[#D53E0F]">
                            <span class="ml-3 text-gray-700">Semua obat tersedia di stok</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-[#D53E0F] rounded focus:ring-[#D53E0F]">
                            <span class="ml-3 text-gray-700">Tidak ada alergi atau interaksi obat</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-[#D53E0F] rounded focus:ring-[#D53E0F]">
                            <span class="ml-3 text-gray-700">Dosis dan aturan pakai sudah benar</span>
                        </label>
                    </div>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Catatan Validasi (Opsional)</label>
                    <textarea placeholder="Tulis catatan jika ada..." rows="3" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent"></textarea>
                </div>

                <!-- Buttons -->
                <form id="validationForm" method="post" action="">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="closeValidationModal()" class="flex-1 border-2 border-stone-300 text-gray-700 font-semibold py-3 rounded-lg hover:bg-gray-50 transition">
                            Batal
                        </button>
                        <button type="submit" class="flex-1 bg-[#D53E0F] text-white font-semibold py-3 rounded-lg hover:bg-[#5E0006] transition">
                            Validasi Resep Selesai
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openValidationModal(orderId, prescriptionId, patientName) {
            document.getElementById('validationModal').classList.remove('hidden');
            document.getElementById('modalRecipientInfo').textContent = `Resep: ${prescriptionId} • Pasien: ${patientName}`;
            document.getElementById('validationForm').action = '/pharmacist/validasi-resep/' + orderId + '/approve';
            console.log("[v0] Opened validation modal for:", prescriptionId, patientName);
        }

        function closeValidationModal() {
            document.getElementById('validationModal').classList.add('hidden');
        }

        // Close modal when clicking outside
        document.getElementById('validationModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeValidationModal();
            }
        });
    </script>
</body>
</html>
