<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- Customer Navbar Fragment - dapat dipanggil dari semua halaman customer -->
    <nav
      th:fragment="customerNavbar(activePage)"
      class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md border-b border-stone-200 shadow-sm z-50 transition-all"
    >
      <div
        class="max-w-screen-2xl mx-auto px-6 py-3 flex justify-between items-center"
      >
        <!-- Logo Area -->
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center"
          >
            <svg
              class="w-5 h-5 text-orange-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
          </div>
          <div
            class="text-xl font-extrabold text-stone-900 tracking-tight hidden sm:block"
          >
            KlinikKu <span class="text-orange-600">Pasien</span>
          </div>
        </div>

        <!-- Dynamic Navigation Links -->
        <div class="hidden md:flex gap-6 items-center">
          <a
            th:href="@{/customer/dashboard}"
            class="font-bold pb-1 transition-all"
            th:classappend="${activePage == 'dashboard'} ? 'text-orange-600 border-b-2 border-orange-600' : 'text-stone-500 hover:text-orange-600'"
          >
            Dashboard
          </a>

          <a
            th:href="@{/customer/medicines}"
            class="font-bold pb-1 transition-all"
            th:classappend="${activePage == 'medicines'} ? 'text-orange-600 border-b-2 border-orange-600' : 'text-stone-500 hover:text-orange-600'"
          >
            Obat
          </a>

          <a
            th:href="@{/customer/consultations}"
            class="font-bold pb-1 transition-all"
            th:classappend="${activePage == 'consultations'} ? 'text-orange-600 border-b-2 border-orange-600' : 'text-stone-500 hover:text-orange-600'"
          >
            Konsultasi
          </a>

          <a
            th:href="@{/customer/orders}"
            class="font-bold pb-1 transition-all"
            th:classappend="${activePage == 'orders'} ? 'text-orange-600 border-b-2 border-orange-600' : 'text-stone-500 hover:text-orange-600'"
          >
            Pesanan
          </a>
        </div>

        <!-- Right Area (Cart & Profile) -->
        <div class="flex items-center gap-5">
          <!-- Cart Icon -->
          <a
            th:href="@{/customer/cart}"
            class="relative text-stone-500 hover:text-orange-600 transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              ></path>
            </svg>
            <span
              class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white"
              id="cart-count"
              th:text="${cartItemCount != null ? cartItemCount : 0}"
              th:classappend="${cartItemCount == null || cartItemCount == 0} ? 'hidden' : ''"
              >0</span
            >
          </a>

          <!-- Profile Dropdown -->
          <div class="relative group">
            <button
              class="flex items-center gap-2 hover:bg-stone-50 p-1.5 rounded-xl transition cursor-pointer"
              th:classappend="${activePage == 'profile'} ? 'ring-2 ring-orange-500 ring-offset-2' : ''"
            >
              <div
                class="w-9 h-9 rounded-full bg-gradient-to-tr from-orange-500 to-orange-400 flex items-center justify-center text-white font-bold text-sm shadow-md overflow-hidden shrink-0"
              >
                <img th:if="${customer != null and customer.profilePhotoPath != null and !customer.profilePhotoPath.isEmpty()}" th:src="@{${customer.profilePhotoPath}}" class="w-full h-full object-cover" alt="Profile">
                <span th:unless="${customer != null and customer.profilePhotoPath != null and !customer.profilePhotoPath.isEmpty()}" th:text="${#strings.substring(currentUserName != null ? currentUserName : (customer != null ? customer.name : 'US'), 0, 2)}">
                  US
                </span>
              </div>
            </button>

            <!-- Dropdown Menu Wrapper -->
            <div class="absolute right-0 top-full pt-2 w-48 hidden group-hover:block transition-all z-50">
              <div class="bg-white rounded-lg shadow-lg border border-stone-200">
                <a
                  th:href="@{/customer/profile}"
                  class="block px-4 py-2 text-sm text-stone-700 hover:bg-stone-50 rounded-t-lg"
                >
                  👤 Profil
                </a>
                <hr class="my-1" />
                <form th:action="@{/auth/logout}" method="post" class="block">
                  <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}"
                  />
                  <button
                    type="submit"
                    class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-stone-50 rounded-b-lg font-semibold"
                  >
                    🚪 Logout
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
