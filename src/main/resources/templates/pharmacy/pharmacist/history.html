<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan - Apoteker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FDF3F0] h-screen overflow-hidden flex">

    <!-- SIDEBAR OPERASIONAL -->
    <aside th:replace="~{pharmacy/fragments/pharmacist-sidebar :: sidebar(activePage='history')}"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden bg-stone-50/50">
        
        <!-- Header & Toolbar -->
        <div class="bg-white border-b border-stone-200 px-8 py-6 flex-shrink-0">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-stone-900">Riwayat Pesanan</h1>
                    <p class="text-sm text-stone-500 mt-1">Pantau pesanan yang telah dikirim, selesai, atau dibatalkan.</p>
                </div>
            </div>
            
            <!-- Tabs & Search -->
            <div class="flex flex-col sm:flex-row justify-between items-end gap-4 mt-6">
                <!-- Search Input -->
                <div class="relative w-full sm:w-80">
                    <i class="ti ti-search absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                    <input type="text" placeholder="Cari ID Pesanan atau Pasien..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent text-sm bg-stone-50 focus:bg-white transition-colors">
                </div>
            </div>
        </div>

        <!-- History Table -->
        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-stone-50 text-xs text-stone-500 uppercase tracking-wide border-b border-stone-200">
                                <th class="px-6 py-4 font-semibold">ID Pesanan</th>
                                <th class="px-6 py-4 font-semibold">Tanggal</th>
                                <th class="px-6 py-4 font-semibold">Pasien</th>
                                <th class="px-6 py-4 font-semibold text-center">Status</th>
                                <th class="px-6 py-4 font-semibold text-right">Total</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-stone-100 text-sm">
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="5" class="px-6 py-8 text-center text-stone-500">
                                    Belum ada riwayat pesanan.
                                </td>
                            </tr>
                            
                            <tr th:each="order : ${orders}" class="hover:bg-stone-50 transition-colors">
                                <td class="px-6 py-4">
                                    <p class="font-bold text-stone-900" th:text="${order.orderId}">#ORD-1025</p>
                                    <p class="text-[10px] text-stone-400 mt-1 uppercase" th:text="${order.trackingId != null ? 'Resi: ' + order.trackingId : ''}"></p>
                                </td>
                                <td class="px-6 py-4">
                                    <p class="text-stone-900" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">23 Jun 2026</p>
                                    <p class="text-[10px] text-stone-500 mt-1" th:text="${#temporals.format(order.createdAt, 'HH:mm')} + ' WIB'">14:30 WIB</p>
                                </td>
                                <td class="px-6 py-4">
                                    <p class="font-bold text-stone-900" th:text="${order.customer.name}">Agus Pratama</p>
                                    <p class="text-[10px] text-stone-500 mt-1" th:text="${order.deliveryAddress}">Alamat</p>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <span th:if="${order.status.name() == 'SHIPPED'}" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-100">
                                        Sedang Dikirim
                                    </span>
                                    <span th:if="${order.status.name() == 'DELIVERED'}" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold bg-green-50 text-green-700 border border-green-100">
                                        Selesai
                                    </span>
                                    <span th:if="${order.status.name() == 'CANCELLED'}" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold bg-red-50 text-red-700 border border-red-100">
                                        Dibatalkan
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <span class="font-bold text-stone-900" th:text="'Rp ' + ${#numbers.formatDecimal(order.subtotal, 1, 'COMMA', 0, 'POINT')}">Rp 145.000</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
