<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Apoteker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FDF3F0] h-screen overflow-hidden flex">

    <!-- SIDEBAR OPERASIONAL -->
    <aside th:replace="~{pharmacy/fragments/pharmacist-sidebar :: sidebar(activePage='profile')}"></aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-y-auto bg-stone-50/50 p-8">
        
        <div class="max-w-3xl w-full mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-stone-900">Profil Saya</h1>
                <p class="text-sm text-stone-500 mt-1">Kelola data diri dan perbarui kata sandi Anda.</p>
            </div>

            <!-- Profile Form -->
            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden mb-6">
                <div class="p-8">
                    <!-- Avatar section -->
                    <div class="flex items-center gap-6 mb-8" th:if="${pharmacist != null}">
                        <div class="w-24 h-24 rounded-full bg-blue-100 border-4 border-white shadow-sm flex items-center justify-center">
                            <span class="text-3xl font-black text-blue-700" th:text="${#strings.substring(pharmacist.name, 0, 1).toUpperCase()}">S</span>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-stone-900" th:text="${pharmacist.name}">Siska Faradilla, S.Farm., Apt.</h2>
                            <p class="text-sm text-stone-500 mb-3" th:text="'SIPA: ' + ${pharmacist.licenseNumber}">SIPA: 19900812/SIPA/123/2021</p>
                            <span class="bg-[#FDF3F0] text-[#D53E0F] text-[10px] font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider border border-[#FAD5C8]" th:if="${pharmacist.shiftSchedule != null}" th:text="${pharmacist.shiftSchedule}">Shift Pagi</span>
                            <span class="bg-[#FDF3F0] text-[#D53E0F] text-[10px] font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider border border-[#FAD5C8]" th:if="${pharmacist.shiftSchedule == null}">Belum diatur</span>
                        </div>
                    </div>

                    <hr class="border-stone-100 mb-8">

                    <!-- Alert messages -->
                    <div th:if="${success}" class="mb-6 p-4 rounded-xl bg-green-50 border border-green-200 text-green-700 text-sm">
                        <i class="ti ti-check w-4 h-4 mr-2 inline-block"></i> <span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="mb-6 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">
                        <i class="ti ti-alert-circle w-4 h-4 mr-2 inline-block"></i> <span th:text="${error}"></span>
                    </div>

                    <!-- Form -->
                    <form th:action="@{/pharmacist/profile/update}" method="post">
                        <div class="space-y-6">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-stone-700 mb-2">Nama Lengkap</label>
                                    <input type="text" name="name" th:value="${pharmacist.name}" class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent text-sm font-medium text-stone-900">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-stone-700 mb-2">Nomor Telepon</label>
                                    <input type="tel" name="phoneNumber" th:value="${pharmacist.phoneNumber}" class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent text-sm font-medium text-stone-900">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-stone-700 mb-2">Email</label>
                                <input type="email" th:value="${pharmacist.email}" disabled class="w-full px-4 py-3 rounded-xl border border-stone-200 bg-stone-50 text-stone-500 text-sm font-medium cursor-not-allowed">
                                <p class="text-xs text-stone-400 mt-1">Email tidak dapat diubah karena terhubung dengan akses sistem.</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="px-8 py-5 border-t border-stone-200 bg-stone-50 flex items-center justify-end">
                        <button type="submit" class="px-6 py-2.5 bg-[#D53E0F] hover:bg-[#5E0006] text-white font-bold rounded-xl shadow-md transition-colors text-sm">
                            Simpan Profil
                        </button>
                    </div>
                </form>
            </div>

            <!-- Password Form -->
            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <form th:action="@{/pharmacist/profile/password}" method="post">
                    <div class="p-8">
                        <h3 class="text-lg font-bold text-stone-900 mb-6 flex items-center gap-2">
                            <i class="ti ti-shield-lock text-[#D53E0F]"></i> Ubah Kata Sandi
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-stone-700 mb-2">Kata Sandi Saat Ini</label>
                                <input type="password" name="currentPassword" required class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-stone-700 mb-2">Kata Sandi Baru</label>
                                <input type="password" name="newPassword" required class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] text-sm">
                            </div>
                        </div>
                    </div>
                    <div class="px-8 py-5 border-t border-stone-200 bg-stone-50 flex items-center justify-end">
                        <button type="submit" class="px-6 py-2.5 bg-stone-900 hover:bg-black text-white font-bold rounded-xl shadow-md transition-colors text-sm">
                            Perbarui Sandi
                        </button>
                    </div>
                </form>
            </div>
            
        </div>
    </main>

</body>
</html>
