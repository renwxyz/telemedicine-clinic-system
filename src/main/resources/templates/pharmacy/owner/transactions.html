<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - Owner Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FDF3F0] min-h-screen">

    <!-- TOP NAVBAR -->
    <nav th:replace="~{pharmacy/fragments/owner-navbar :: navbar(activePage='transactions')}"></nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Page Header -->
        <div class="mb-8 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-stone-900 mb-2">Riwayat Transaksi</h1>
                <p class="text-stone-500 font-medium">Pantau semua pesanan dan transaksi apotek Anda.</p>
            </div>
            <div class="flex gap-2">
                <button class="bg-white px-4 py-2 rounded-xl border border-stone-200 shadow-sm text-sm font-bold text-stone-700 flex items-center gap-2 hover:bg-stone-50 transition">
                    <i class="ti ti-download text-stone-400"></i> Export CSV
                </button>
                <div class="bg-white px-4 py-2 rounded-xl border border-stone-200 shadow-sm flex items-center gap-2">
                    <i class="ti ti-calendar text-stone-400"></i>
                    <span class="text-sm font-bold text-stone-700">Hari Ini, 23 Jun 2026</span>
                </div>
            </div>
        </div>

        <!-- Filter & Search -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-200 mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="flex gap-2 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
                <button class="px-4 py-2 rounded-xl text-sm font-bold bg-[#D53E0F] text-white shrink-0">Semua</button>
                <button class="px-4 py-2 rounded-xl text-sm font-bold bg-stone-100 text-stone-600 hover:bg-stone-200 shrink-0">Selesai</button>
                <button class="px-4 py-2 rounded-xl text-sm font-bold bg-stone-100 text-stone-600 hover:bg-stone-200 shrink-0">Diproses</button>
                <button class="px-4 py-2 rounded-xl text-sm font-bold bg-stone-100 text-stone-600 hover:bg-stone-200 shrink-0">Dibatalkan</button>
            </div>
            <div class="relative w-full sm:w-64 shrink-0">
                <i class="ti ti-search absolute left-3 top-1/2 -translate-y-1/2 text-stone-400"></i>
                <input type="text" placeholder="Cari ID / Nama..." class="w-full pl-10 pr-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl text-sm font-medium focus:outline-none focus:border-[#D53E0F] focus:ring-1 focus:ring-[#D53E0F] transition">
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="bg-stone-50 border-b border-stone-200 text-stone-500 text-xs uppercase tracking-wider font-bold">
                            <th class="px-6 py-4">Waktu</th>
                            <th class="px-6 py-4">ID Pesanan</th>
                            <th class="px-6 py-4">Pelanggan</th>
                            <th class="px-6 py-4 text-right">Total (Rp)</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm font-medium text-stone-900 divide-y divide-stone-100">
                        <tr th:each="order : ${orders}" class="hover:bg-stone-50 transition-colors">
                            <td class="px-6 py-4 text-stone-500" th:text="${#temporals.format(order.createdAt, 'HH:mm')}">14:32</td>
                            <td class="px-6 py-4 font-bold text-[#D53E0F]" th:text="${order.orderId}">#ORD-9021</td>
                            <td class="px-6 py-4">
                                <span th:text="${order.customer != null ? order.customer.name : 'Pelanggan'}">Nama Pelanggan</span>
                                <span class="block text-xs font-normal text-stone-400" th:text="${order.prescriptionId != null ? 'Resep Dokter' : 'Obat Bebas'}">Tipe</span>
                            </td>
                            <td class="px-6 py-4 text-right font-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}">125.000</td>
                            <td class="px-6 py-4 text-center">
                                <span th:if="${order.status.name() == 'COMPLETED' or order.status.name() == 'SHIPPED' or order.status.name() == 'DELIVERED'}" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase inline-flex items-center gap-1">
                                    <i class="ti ti-check w-4"></i> Selesai
                                </span>
                                <span th:if="${order.status.name() == 'PROCESSING' or order.status.name() == 'PENDING'}" class="bg-orange-100 text-orange-700 px-3 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase inline-flex items-center gap-1">
                                    <i class="ti ti-loader w-4"></i> Diproses
                                </span>
                                <span th:if="${order.status.name() == 'CANCELLED'}" class="bg-red-100 text-red-700 px-3 py-1.5 rounded-lg text-xs font-bold tracking-wide uppercase inline-flex items-center gap-1">
                                    <i class="ti ti-x w-4"></i> Dibatalkan
                                </span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button class="text-stone-400 hover:text-[#D53E0F] p-2 hover:bg-orange-50 rounded-lg transition-colors"><i class="ti ti-eye"></i></button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="6" class="px-6 py-8 text-center text-stone-500">
                                <div class="flex flex-col items-center justify-center">
                                    <i class="ti ti-shopping-cart text-4xl text-stone-300 mb-2"></i>
                                    <p class="font-bold text-stone-600">Belum ada transaksi</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="px-6 py-4 border-t border-stone-200 bg-stone-50 flex flex-col sm:flex-row items-center justify-between gap-4">
                <p class="text-xs font-medium text-stone-500">Menampilkan <span class="font-bold text-stone-900">1</span> sampai <span class="font-bold text-stone-900">5</span> dari <span class="font-bold text-stone-900">24</span> transaksi</p>
                <div class="flex items-center gap-2">
                    <button class="w-8 h-8 rounded-lg bg-white border border-stone-200 flex items-center justify-center text-stone-400 hover:bg-stone-50 hover:text-stone-700 transition" disabled>
                        <i class="ti ti-chevron-left"></i>
                    </button>
                    <button class="w-8 h-8 rounded-lg bg-[#D53E0F] text-white flex items-center justify-center font-bold text-xs shadow-sm">1</button>
                    <button class="w-8 h-8 rounded-lg bg-white border border-stone-200 flex items-center justify-center font-bold text-xs text-stone-600 hover:bg-stone-50 transition">2</button>
                    <button class="w-8 h-8 rounded-lg bg-white border border-stone-200 flex items-center justify-center font-bold text-xs text-stone-600 hover:bg-stone-50 transition">3</button>
                    <button class="w-8 h-8 rounded-lg bg-white border border-stone-200 flex items-center justify-center text-stone-400 hover:bg-stone-50 hover:text-stone-700 transition">
                        <i class="ti ti-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
