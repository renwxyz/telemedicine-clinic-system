<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Apotek - KlinikKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FDF3F0] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-sm mb-4 border border-stone-200">
                <i class="ti ti-building-hospital text-3xl text-[#D53E0F]"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-stone-900 tracking-tight mb-2">Pilih Apotek Anda</h1>
            <p class="text-stone-500 max-w-lg mx-auto">Anda memiliki akses ke beberapa apotek. Silakan pilih apotek mana yang ingin Anda kelola saat ini.</p>
        </div>

        <!-- Alert -->
        <div th:if="${param.error}" class="max-w-lg mx-auto mb-6 p-4 rounded-xl bg-red-50 border border-red-200 flex items-center gap-3 text-red-700">
            <i class="ti ti-alert-circle text-xl"></i>
            <div>
                <p class="text-sm font-bold">Gagal memilih apotek</p>
                <p class="text-xs">Apotek yang Anda pilih tidak valid atau Anda tidak memiliki akses.</p>
            </div>
        </div>

        <!-- Pharmacy Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <th:block th:each="pharmacy : ${pharmacies}">
                <div class="bg-white rounded-2xl p-6 border border-stone-200 shadow-sm hover:shadow-md transition-all hover:border-[#D53E0F]/30 group flex flex-col">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center border border-blue-100 group-hover:bg-[#D53E0F] group-hover:text-white transition-colors">
                            <i class="ti ti-building-store text-2xl"></i>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-bold text-stone-900 mb-1" th:text="${pharmacy.name}">Apotek Nama</h3>
                    <p class="text-sm text-stone-500 mb-4 line-clamp-2 flex-grow" th:text="${pharmacy.address}">Alamat Apotek</p>
                    
                    <div class="space-y-2 mb-6">
                        <div class="flex items-center gap-2 text-xs text-stone-600">
                            <i class="ti ti-phone text-stone-400"></i>
                            <span th:text="${pharmacy.phoneNumber}">Nomor Telepon</span>
                        </div>
                        <div class="flex items-center gap-2 text-xs text-stone-600">
                            <i class="ti ti-file-certificate text-stone-400"></i>
                            <span th:text="${pharmacy.legalDocumentNumber}">SIA</span>
                        </div>
                    </div>
                    
                    <form th:action="@{/owner/pharmacy/select}" method="post" class="mt-auto m-0">
                        <input type="hidden" name="pharmacyId" th:value="${pharmacy.pharmacyId}" />
                        <button type="submit" class="w-full py-2.5 px-4 bg-stone-50 text-stone-700 font-bold text-sm rounded-xl border border-stone-200 hover:bg-[#D53E0F] hover:text-white hover:border-[#D53E0F] transition-all flex items-center justify-center gap-2">
                            Masuk ke Apotek <i class="ti ti-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </th:block>

        </div>

        <div class="mt-12 text-center">
            <form th:action="@{/auth/logout}" method="post" class="inline-block m-0 p-0">
                <button type="submit" class="text-sm font-semibold text-stone-500 hover:text-red-600 transition-colors flex items-center gap-2">
                    <i class="ti ti-logout"></i> Keluar dari akun
                </button>
            </form>
        </div>
    </div>

</body>
</html>
